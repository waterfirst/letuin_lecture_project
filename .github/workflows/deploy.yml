name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            lecture_11/package-lock.json
            lecture_12/package-lock.json
            lecture_13/package-lock.json
            lecture_14/package-lock.json
            lecture_15/package-lock.json
            lecture_16/package-lock.json
            lecture_17/package-lock.json
            project_01/package-lock.json
            project_02/package-lock.json
            project_03/package-lock.json

      - name: Build all apps
        run: |
          # Function to build each app
          build_app() {
            local dir=$1
            local app_name=$2
            echo "📦 Building $app_name..."
            cd "$dir"

            # Update vite.config.ts with correct base path
            cat > vite.config.ts << 'EOF'
          import { defineConfig } from 'vite'
          import react from '@vitejs/plugin-react'

          export default defineConfig({
            plugins: [react()],
            base: '/letuin_lecture_project/'$app_name'/',
          })
          EOF

            npm ci
            npm run build
            cd ..
          }

          # Build all lectures
          build_app "lecture_11" "lecture_11"
          build_app "lecture_12" "lecture_12"
          build_app "lecture_13" "lecture_13"
          build_app "lecture_14" "lecture_14"
          build_app "lecture_15" "lecture_15"
          build_app "lecture_16" "lecture_16"
          build_app "lecture_17" "lecture_17"

          # Build all projects
          build_app "project_01" "project_01"
          build_app "project_02" "project_02"
          build_app "project_03" "project_03"

      - name: Prepare deployment directory
        run: |
          mkdir -p public
          cp index.html public/

          # Copy all built apps to public directory
          for app in lecture_11 lecture_12 lecture_13 lecture_14 lecture_15 lecture_16 lecture_17 project_01 project_02 project_03; do
            if [ -d "$app/dist" ]; then
              cp -r "$app/dist" "public/$app"
              echo "✅ Copied $app"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
